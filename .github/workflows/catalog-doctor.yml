name: catalog-doctor

# Schema validator. Refuses unpinned versions, dangerous install patterns,
# and quarantine entries missing a reason. Runs on every PR + push to main.
# No secrets needed.

on:
  pull_request:
    paths:
      - 'catalog/**'
      - 'bin/statuslines.js'
      - 'tests/**'
      - '.github/workflows/catalog-doctor.yml'
  push:
    branches: [main]
    paths:
      - 'catalog/**'
      - 'bin/statuslines.js'
      - 'tests/**'

permissions:
  contents: read

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node --test tests/statuslines.test.js

      - name: Run doctor
        run: node bin/statuslines.js doctor

      - name: Verify rendered docs are in sync
        run: |
          node bin/statuslines.js render-readme
          node bin/statuslines.js render-top-readme
          node bin/statuslines.js render-quarantine
          if ! git diff --quiet -- catalog/README.md README.md catalog/QUARANTINE.md; then
            echo "::error::Generated docs are out of sync. Run:"
            echo "  node bin/statuslines.js render-readme"
            echo "  node bin/statuslines.js render-top-readme"
            echo "  node bin/statuslines.js render-quarantine"
            git --no-pager diff -- catalog/README.md README.md catalog/QUARANTINE.md
            exit 1
          fi

      - name: Check oversized catalog images
        run: |
          sudo apt-get install -y imagemagick gifsicle
          # Advisory: warn if any target image is over its size threshold.
          # This does not block the workflow — a large image means optimize-images.mjs
          # needs to be re-run and the result committed, but it is not a schema error.
          if ! node scripts/optimize-images.mjs --check; then
            echo "::warning::One or more catalog images exceed their size thresholds."
            echo "::warning::Run: node scripts/optimize-images.mjs  (then commit the results)"
          fi
